services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=950
      - PGID=950
      - TZ=Europe/London
    volumes:
      - /mnt/storage/jellyfin/config:/config
      - /mnt/storage/media:/data/media
    ports:
      - 8096:8096
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped