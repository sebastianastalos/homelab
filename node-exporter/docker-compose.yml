services:
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    network_mode: host
    pid: host
    env_file:
      - .env
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/devicemapper|rootfs/var/lib/docker/aufs)($$|/)
    restart: unless-stopped
