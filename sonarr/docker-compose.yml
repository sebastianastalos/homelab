services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    environment:
      - PUID=950
      - PGID=950
      - TZ=Europe/London
    volumes:
      - /mnt/storage/sonarr/config:/config
      - /mnt/storage/media:/media
      - /mnt/storage/data:/data
    ports:
      - 8989:8989
    restart: unless-stopped