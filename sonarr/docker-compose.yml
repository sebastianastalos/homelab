services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    env_file:
      - .env
    volumes:
      - /mnt/app/sonarr/config:/config
      - /mnt/storage/mediadata/media:/media
      - /mnt/storage/mediadata/data:/data
    ports:
      - 8989:8989
    restart: unless-stopped